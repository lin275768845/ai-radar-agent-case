name: Public Mirror Static Checks

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date label for review context; no production run is executed."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Always treated as no-side-effect validation in this public mirror."
        required: false
        default: false
        type: boolean
      bocha_enabled:
        description: "Pattern input only; provider calls are not made by this workflow."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate eval definitions
        run: python3 evals/check_ai_radar_week2_eval_cases.py

      - name: Validate demo manifest JSON
        run: python3 -m json.tool demo_run/demo_manifest.json >/dev/null

      - name: Compile showcase Python slice
        run: |
          python3 -m py_compile \
            ai_radar_agent/dates.py \
            ai_radar_agent/models.py \
            ai_radar_agent/report_reconcile.py \
            tests/test_report_reconcile.py \
            tests/test_cloudflare_trigger.py

      - name: Confirm no production pipeline
        run: |
          echo "This public mirror workflow runs static checks only."
          echo "No provider APIs, LLMs, Feishu, webhooks, Cloudflare deploys, or production pipeline steps are executed."
